pre-commit:
  parallel: false
  commands:
    format:
      priority: 1
      glob:
        - "*.{js,jsx,ts,tsx,json,css,md,mdx}"
        - "**/*.{js,jsx,ts,tsx,json,css,md,mdx}"
      run: pnpm format
      stage_fixed: true
    lint:
      priority: 2
      glob:
        - "*.{js,jsx,ts,tsx,json,css,md,mdx}"
        - "**/*.{js,jsx,ts,tsx,json,css,md,mdx}"
      run: pnpm lint
    typecheck:
      priority: 3
      glob:
        - "*.{ts,tsx,mts,cts}"
        - "**/*.{ts,tsx,mts,cts}"
      run: pnpm typecheck
